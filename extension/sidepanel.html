<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>한성대 학사 비서</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-title">학사 비서</span>
        <span class="brand-badge">프로토타입</span>
      </div>
      <button type="button" class="icon-btn" id="btn-settings" title="API 설정">⚙</button>
    </header>

    <section class="settings-panel hidden" id="settings-panel" aria-label="API 설정">
      <label class="field">
        <span>백엔드 종류</span>
        <select id="backend-type" aria-label="백엔드 종류">
          <option value="custom">커스텀 API (POST …/chat)</option>
          <option value="ollama">Ollama (POST …/api/chat)</option>
        </select>
      </label>
      <label class="field">
        <span>베이스 URL (비우면 모의 응답)</span>
        <input
          type="url"
          id="api-base"
          placeholder="http://127.0.0.1:8000"
          autocomplete="off"
        />
      </label>
      <label class="field hidden" id="ollama-model-wrap">
        <span>Ollama 모델 이름</span>
        <input type="text" id="ollama-model" placeholder="llama3.2" spellcheck="false" autocomplete="off" />
      </label>
      <p class="hint" id="hint-custom">
        커스텀: <code>POST {URL}/chat</code> · 본문 <code>{"message":"..."}</code>
      </p>
      <p class="hint hidden" id="hint-ollama">
        Ollama 기본 주소는 <code>http://127.0.0.1:11434</code> 입니다. 터미널에서 <code>ollama serve</code> 가 떠 있어야 하며, 모델은 <code>ollama pull 모델이름</code> 으로 받아 두세요.
      </p>
      <button type="button" class="primary" id="btn-save-settings">저장</button>
    </section>

    <main class="chat" id="chat" aria-live="polite"></main>

    <footer class="composer">
      <textarea
        id="input"
        rows="2"
        maxlength="2000"
        placeholder="예: 2024년 입학생 기준 컴퓨터공학 졸업요건 정리해줘"
      ></textarea>
      <button type="button" class="primary" id="btn-send">보내기</button>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
